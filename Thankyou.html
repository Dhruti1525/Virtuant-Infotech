<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuantech - Thank You</title>
    <link rel="stylesheet" href="css/style.min.css">
    <style>
      
        body {
            /* font-family: 'Arial', sans-serif; */
            background-image: linear-gradient(to right, #98e9da, #88e2d0); /* Light shades matching button */
            background-color: #A3E4D7; /* Fallback color */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            width: 80%;
            max-width: 800px;
        }

        .thank-you-message {
            flex: 1;
        }

        .thank-you-message h1 {
            color: #333; /* Darker color for better readability */
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .thank-you-message p {
            font-size: 1.2em;
            color: #555; /* Slightly lighter shade */
            margin-bottom: 25px;
        }

        #goBackButton {
            display: inline-block;
            background-color: #30BD9B;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        #goBackButton:hover {
            background: linear-gradient(90deg, #009973, #30BD9B); /* Subtle gradient effect on hover */
            transform: translateY(-3px);
        }

        .images {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: 20px;
        }

        .images img {
            max-width: 150px;
            height: auto;
            margin-bottom: 15px;
        }

        /* Media query to hide image on screens smaller than 600px */
        @media (max-width: 600px) {
            .images {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="thank-you-message alt-font">
            <h1>Thank You!</h1>
            <p>Thanks for reaching out to Virtuant Infotech! We’ve received your submission and will get back to you soon.</p>
            <a href="https://virtuantech.com/index.html" id="goBackButton">Go Back</a>
        </div>
        <!-- <div class="images">
            <img src="https://img.freepik.com/free-vector/thank-you-concept-illustration_114360-12887.jpg?t=st=1725257596~exp=1725261196~hmac=2f1f383953cb5575ea1ed26dc0bc9a232440f1b5587cd11071ff14422bd2d336&w=740" alt="First Vector Image">
        </div> -->
    </div>
</body>
</html>
